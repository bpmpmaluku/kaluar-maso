<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Kaluar-Maso BPMP Maluku</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      height:100vh;
      overflow:hidden;
    }

    iframe{
      width:100%;
      height:100vh;
      border:none;
      background:white;
    }

    .loading{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:white;
      z-index:9999;
      font-size:18px;
      color:#444;
    }
  </style>
</head>
<body>

<div class="loading" id="loading">
  Memuat aplikasi Kaluar-Maso...
</div>

<iframe
  id="appFrame"
  src="https://script.google.com/macros/s/AKfycbyB-p2BaJDwzCrP2eQOXEfVuPAbrySSbnBPCzMSWhdS8od_usP-1pWtplD7XaIsEZ4yyg/exec"
  allowfullscreen>
</iframe>

<script>
  const iframe = document.getElementById('appFrame');
  const loading = document.getElementById('loading');

  iframe.onload = function () {
    loading.style.display = 'none';
  };
</script>

</body>
</html>
